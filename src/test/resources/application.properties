# Keep tests self-contained for JWT validation/signing.
smallrye.jwt.sign.key.location=test-private-key.pem
mp.jwt.verify.publickey.location=test-public-key.pem
mp.jwt.verify.issuer=udesc-api

# Allow local test execution without mandatory env vars.
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:ADMIN}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5433/api}
