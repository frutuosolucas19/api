# --- Datasource Postgres ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_JDBC_URL}
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.max-size=15

# dev/test also require explicit env vars (.env local, CI secrets, etc.)
%dev.quarkus.datasource.username=${DB_USERNAME}
%dev.quarkus.datasource.password=${DB_PASSWORD}
%dev.quarkus.datasource.jdbc.url=${DB_JDBC_URL}
%test.quarkus.datasource.username=${DB_USERNAME}
%test.quarkus.datasource.password=${DB_PASSWORD}
%test.quarkus.datasource.jdbc.url=${DB_JDBC_URL}

# --- JPA/Hibernate ---
# Schema changes must come from versioned migrations (Flyway), not Hibernate auto-update.
quarkus.hibernate-orm.schema-management.strategy=validate
%dev.quarkus.hibernate-orm.schema-management.strategy=validate
%dev.quarkus.hibernate-orm.log.sql=true
%test.quarkus.hibernate-orm.schema-management.strategy=validate

# --- Flyway migrations ---
quarkus.flyway.locations=db/migration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
%prod.quarkus.flyway.clean-at-start=false
%test.quarkus.flyway.clean-at-start=${TEST_DB_CLEAN_AT_START:false}

# --- JWT ---
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION}
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION}
mp.jwt.verify.issuer=${JWT_ISSUER:udesc-api}

# dev/test also require explicit key locations
%dev.smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION}
%dev.mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION}
%test.smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION}
%test.mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION}

# --- Route security (prod-like default) ---
# Public endpoints in production
quarkus.http.auth.permission.public.paths=/usuario/cadastro,/usuario/login,/usuario/esqueci-senha,/usuario/redefinir-senha
quarkus.http.auth.permission.public.policy=permit

# Everything else requires authentication
quarkus.http.auth.permission.protegido.paths=/*
quarkus.http.auth.permission.protegido.policy=authenticated

# --- Dev-only public pages and docs ---
%dev.quarkus.http.auth.permission.public.paths=/,/index.html,/q/swagger-ui,/q/swagger-ui/*,/q/openapi,/usuario/cadastro,/usuario/login,/usuario/esqueci-senha,/usuario/redefinir-senha
%dev.quarkus.http.auth.proactive=false
%dev.quarkus.swagger-ui.always-include=true
%prod.quarkus.swagger-ui.always-include=false

# CORS for mobile/web clients (origins configurable via env when needed).
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:*}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type

# --- Upload limit (Base64 images) ---
quarkus.http.limits.max-body-size=20M
